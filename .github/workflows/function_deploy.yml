name: Deploy to Cloud Run functions

on:
  push:
    branches:
      - develop # ここは検証で使用するブランチ名（developなど）に変更してください

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # 🔐 WIFでの認証（OIDCトークン発行）に必須です！

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # プロジェクト番号を含めたWIFプロバイダのフルパスを指定します
          workload_identity_provider: 'projects/644836843362/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-ci-runner@tactical-racer-432905-g9.iam.gserviceaccount.com'

      - name: Deploy Cloud Run function
        uses: google-github-actions/deploy-cloud-functions@v2
        with:
          name: 'my-test-function' # GCP上に作成される関数名
          runtime: 'python310'     # 🐍 使用するPythonのバージョン（例: python310, python311）
          entry_point: 'main'      # main.pyの中で実行される関数名
          region: 'asia-northeast1' 
          service_account_email: 'github-actions-ci-runner@tactical-racer-432905-g9.iam.gserviceaccount.com'